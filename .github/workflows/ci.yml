name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build Docker images ───────────────────────────────
      - name: Build backend image
        run: docker build -t ec-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t ec-frontend:ci ./frontend

      # ── 3. Verify required artifact files ────────────────────
      - name: Verify required artifact files are present
        run: |
          for f in \
            carbon_aco_artifacts/leaderboard.json \
            carbon_aco_artifacts/emissions.csv \
            carbon_aco_artifacts/aco_logs.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing required artifact: $f"
              exit 1
            fi
          done
          echo "All required artifact files present."

      # ── 4. Start containers (CI override disables restart policy)
      - name: Start containers
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up -d

      # ── 5. Wait for backend — cold-start can take 20-30 s ────
      #   Root cause of original failure (exit code 56):
      #   curl fired immediately after `docker compose up -d` returned,
      #   before uvicorn finished importing PyTorch/FastAPI.
      #
      #   Fix:
      #   a) 20 s initial sleep to let uvicorn reach "Application startup complete"
      #   b) Verify the container is still running before each curl attempt
      #   c) 20 retries × 6 s = 120 s total window
      #   d) Accept any 2xx response (not only "200" as a string)
      - name: Wait for backend /health
        run: |
          echo "Sleeping 20 s for uvicorn + PyTorch cold start..."
          sleep 20

          echo "Polling http://localhost:8001/health ..."
          for i in $(seq 1 20); do
            # Abort if the container has already exited (crash detected early)
            STATE=$(docker inspect --format='{{.State.Status}}' backend 2>/dev/null || echo "missing")
            if [ "$STATE" != "running" ]; then
              echo "ERROR: backend container is not running (state=$STATE)"
              docker compose logs backend
              exit 1
            fi

            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8001/health)
            if [ "${HTTP:0:1}" = "2" ]; then
              echo "Backend is healthy — HTTP $HTTP (attempt $i)"
              exit 0
            fi

            echo "Attempt $i/20: HTTP '$HTTP' — retrying in 6 s..."
            sleep 6
          done

          echo "ERROR: backend did not become healthy within 140 s"
          docker compose logs backend
          exit 1

      # ── 6. Smoke-test endpoints ──────────────────────────────
      - name: Smoke-test backend endpoints
        run: |
          echo "--- /health ---"
          curl -sf http://localhost:8001/health | python3 -m json.tool

          echo "--- /leaderboard (via nginx proxy) ---"
          curl -sf http://localhost:5173/api/leaderboard \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Models: {d.get(\"total_models\", \"N/A\")}')"

          echo "--- /carbon ---"
          curl -sf http://localhost:5173/api/carbon \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Records: {d.get(\"record_count\", \"N/A\")}')"

          echo "--- /aco ---"
          curl -sf http://localhost:5173/api/aco \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Best model: {d.get(\"best_config\", {}).get(\"model\", \"N/A\")}')"

          echo "All smoke tests passed."

      # ── 7. Dump logs on failure ──────────────────────────────
      - name: Dump container logs (on failure)
        if: failure()
        run: docker compose logs

      # ── 8. Shutdown ──────────────────────────────────────────
      - name: Shutdown containers
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            down --volumes