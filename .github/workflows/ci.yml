name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker Buildx (enables cache + multi-platform) ───
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Layer cache — dramatically speeds up re-builds ───
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 4. Build images individually so errors are isolated ─
      - name: Build backend image
        run: |
          docker build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t ec-backend:ci \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ec-frontend:ci \
            ./frontend

      # ── 5. Seed minimal artifacts so /carbon & /aco don't 503
      #       (the real .pt/.pkl are gitignored; CSVs + JSON are tracked)
      - name: Verify required artifact files are present
        run: |
          for f in \
            carbon_aco_artifacts/leaderboard.json \
            carbon_aco_artifacts/emissions.csv \
            carbon_aco_artifacts/aco_logs.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing required artifact: $f"
              exit 1
            fi
          done
          echo "All required artifact files present."

      # ── 6. Start stack (detached) ───────────────────────────
      - name: Start containers
        run: docker compose up -d

      # ── 7. Health-check with retry (10 × 5 s = 50 s window) ─
      - name: Wait for backend /health
        run: |
          echo "Polling http://localhost:8001/health ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5 s..."
            sleep 5
          done
          echo "ERROR: backend did not become healthy within 50 s"
          docker compose logs backend
          exit 1

      # ── 8. Smoke-test key endpoints via the nginx proxy ─────
      - name: Smoke-test backend endpoints
        run: |
          echo "--- /health ---"
          curl -sf http://localhost:8001/health | python3 -m json.tool

          echo "--- /leaderboard (via proxy) ---"
          curl -sf http://localhost:5173/api/leaderboard \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Models: {d[\"total_models\"]}')"

          echo "--- /carbon ---"
          curl -sf http://localhost:5173/api/carbon \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Records: {d[\"record_count\"]}')"

          echo "--- /aco ---"
          curl -sf http://localhost:5173/api/aco \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Best model: {d[\"best_config\"][\"model\"]}')"

          echo "All smoke tests passed."

      # ── 9. Always dump logs on failure for debugging ─────────
      - name: Dump container logs (on failure)
        if: failure()
        run: docker compose logs

      # ── 10. Clean up ─────────────────────────────────────────
      - name: Shutdown containers
        if: always()
        run: docker compose down --volumes

      # Swap cache dirs so next run gets fresh layers
      - name: Rotate Docker layer cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
