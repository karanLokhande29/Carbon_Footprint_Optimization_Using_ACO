# ──────────────────────────────────────────────────────────
# EC_Project — Docker Compose  (backend + frontend)
# ──────────────────────────────────────────────────────────
# Usage:
#   docker-compose up --build
#   http://localhost:5173  → Frontend  (proxies /api → backend)
#   http://localhost:8001  → Backend   (direct API access)
# ──────────────────────────────────────────────────────────

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8001:8001"
    volumes:
      # Model weights & CSV artifacts live outside backend/;
      # mount them to the path the code expects at runtime:
      # Path(__file__).parent.parent / "carbon_aco_artifacts"
      #  →  /app/../carbon_aco_artifacts  →  /carbon_aco_artifacts
      - ./carbon_aco_artifacts:/carbon_aco_artifacts:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
